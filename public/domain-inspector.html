<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Inspector | The Shield IT</title>
    <meta name="description" content="Look up WHOIS registration details and DNS records for any domain in one place.">
    <link rel="icon" href="/favicon.ico">
    <script src="/shared-shell.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #060a12;
            color: #ddd9cf;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 28px; padding-top: 20px; }
        h1 {
            font-size: 2.2rem; margin-bottom: 8px;
            background: linear-gradient(135deg, #e3a93c 0%, #c98e2e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { color: #8e9088; font-size: 1rem; }

        /* Input */
        .input-row {
            display: flex; gap: 10px; margin-bottom: 24px;
            background: #1a2236; border-radius: 12px; padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .domain-input {
            flex: 1; background: rgba(6,10,18,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 11px 16px; color: #ddd9cf; font-size: 1rem;
            outline: none; transition: border-color 0.2s;
        }
        .domain-input:focus { border-color: #e3a93c; }
        .domain-input::placeholder { color: #363941; }
        .lookup-btn {
            background: linear-gradient(135deg, #e3a93c, #d29a32); color: white;
            border: none; padding: 11px 22px; border-radius: 8px; cursor: pointer;
            font-size: 0.95rem; font-weight: 600; transition: all 0.2s;
            white-space: nowrap;
        }
        .lookup-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(227,169,60,0.4); }
        .lookup-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Tabs */
        .tabs { display: flex; gap: 4px; background: #1a2236; border-radius: 12px; padding: 6px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 10px 20px; border: none; border-radius: 8px;
            background: transparent; color: #8e9088; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: #e3a93c; color: white; }
        .tab-btn:hover:not(.active) { background: rgba(227,169,60,0.1); color: #ddd9cf; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Cards */
        .card {
            background: #1a2236; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 26px; margin-bottom: 18px;
        }
        .card h3 { color: #e3a93c; margin-bottom: 16px; font-size: 1rem; }

        /* WHOIS table */
        .whois-table { width: 100%; border-collapse: collapse; }
        .whois-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .whois-table tr:last-child { border-bottom: none; }
        .whois-table td { padding: 10px 8px; font-size: 0.88rem; vertical-align: top; }
        .whois-table td:first-child { color: #8e9088; width: 160px; white-space: nowrap; }
        .whois-table td:last-child { color: #ddd9cf; font-family: 'Courier New', monospace; word-break: break-all; }

        /* DNS records */
        .record-group { margin-bottom: 18px; }
        .record-type { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; margin-bottom: 8px; }
        .rt-a { background: rgba(227,169,60,0.15); color: #ecbc62; }
        .rt-aaaa { background: rgba(79,134,232,0.15); color: #6f9ded; }
        .rt-mx { background: rgba(168,85,247,0.15); color: #c084fc; }
        .rt-ns { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .rt-txt { background: rgba(34,197,94,0.15); color: #86efac; }
        .rt-cname { background: rgba(239,68,68,0.15); color: #f87171; }
        .record-row {
            display: flex; gap: 12px; background: rgba(6,10,18,0.5);
            border-radius: 8px; padding: 9px 12px; margin-bottom: 6px;
            font-family: 'Courier New', monospace; font-size: 0.82rem; color: #bcb9ae;
            word-break: break-all;
        }
        .record-ttl { color: #363941; white-space: nowrap; min-width: 60px; }

        .placeholder {
            text-align: center; padding: 48px 20px; color: #363941;
        }
        .placeholder-icon { font-size: 3rem; margin-bottom: 12px; }
        .placeholder p { font-size: 0.9rem; }

        .loading { text-align: center; padding: 40px; }
        .spinner {
            border: 4px solid rgba(227,169,60,0.2); border-top-color: #e3a93c;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px; padding: 16px; color: #f87171; font-size: 0.88rem;
        }
        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.78rem; font-weight: 700;
        }
        .status-active { background: rgba(34,197,94,0.15); color: #86efac; }
        .status-expired { background: rgba(239,68,68,0.15); color: #f87171; }

        .info-note {
            background: rgba(227,169,60,0.07); border-left: 3px solid #e3a93c;
            padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 0.82rem; color: #8e9088; margin-top: 14px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.7rem; }
            .input-row { flex-direction: column; }
            .tabs { flex-direction: column; }
        }
    </style>
  <link rel="stylesheet" href="/field-kit-theme.css">
</head>
<body>
<div class="container">
    <header>
        <h1>🌐 Domain Inspector</h1>
        <p class="subtitle">Look up WHOIS registration details and DNS records for any domain</p>
    </header>

    <div class="input-row">
        <input type="text" class="domain-input" id="domainInput" placeholder="example.com" oninput="clearResults()" onkeydown="if(event.key==='Enter') doLookup()">
        <button class="lookup-btn" id="lookupBtn" onclick="doLookup()">🔍 Look Up</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-whois-btn" onclick="switchTab('whois', this)">📋 WHOIS</button>
        <button class="tab-btn" id="tab-dns-btn" onclick="switchTab('dns', this)">🗂️ DNS Records</button>
    </div>

    <!-- WHOIS TAB -->
    <div id="tab-whois" class="tab-panel active">
        <div id="whois-placeholder" class="card">
            <div class="placeholder">
                <div class="placeholder-icon">🔎</div>
                <p>Enter a domain name above and click Look Up</p>
            </div>
        </div>
        <div id="whois-loading" class="card loading" style="display:none;">
            <div class="spinner"></div>
            <p>Fetching WHOIS data...</p>
        </div>
        <div id="whois-error" class="card" style="display:none;"></div>
        <div id="whois-results" style="display:none;"></div>
    </div>

    <!-- DNS TAB -->
    <div id="tab-dns" class="tab-panel">
        <div id="dns-placeholder" class="card">
            <div class="placeholder">
                <div class="placeholder-icon">🗂️</div>
                <p>Enter a domain name above and click Look Up</p>
            </div>
        </div>
        <div id="dns-loading" class="card loading" style="display:none;">
            <div class="spinner"></div>
            <p>Fetching DNS records...</p>
        </div>
        <div id="dns-error" class="card" style="display:none;"></div>
        <div id="dns-results" style="display:none;"></div>
    </div>
</div>

<script>
    function switchTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
    }

    function clearResults() {
        ['whois', 'dns'].forEach(k => {
            show(k + '-placeholder');
            hide(k + '-loading');
            hide(k + '-error');
            hide(k + '-results');
        });
    }

    function show(id) { document.getElementById(id).style.display = ''; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }

    function normalizeDomain(val) {
        return val.trim().toLowerCase().replace(/^https?:\/\//,'').replace(/\/.*/,'');
    }

    async function doLookup() {
        const raw = document.getElementById('domainInput').value;
        const domain = normalizeDomain(raw);
        if (!domain) return;
        document.getElementById('domainInput').value = domain;
        document.getElementById('lookupBtn').disabled = true;

        // Show loading in both tabs
        ['whois', 'dns'].forEach(k => {
            hide(k + '-placeholder');
            show(k + '-loading');
            hide(k + '-error');
            hide(k + '-results');
        });

        await Promise.all([fetchWHOIS(domain), fetchDNS(domain)]);
        document.getElementById('lookupBtn').disabled = false;
    }

    // WHOIS via whois.rdap.org (public RDAP)
    async function fetchWHOIS(domain) {
        try {
            const r = await fetch(`https://rdap.org/domain/${encodeURIComponent(domain)}`);
            if (!r.ok) throw new Error('RDAP lookup failed (HTTP ' + r.status + ')');
            const d = await r.json();
            renderWHOIS(domain, d);
        } catch (e) {
            hide('whois-loading');
            show('whois-error');
            document.getElementById('whois-error').innerHTML = `<div class="error-box">⚠️ WHOIS lookup failed: ${e.message}. This may be a CORS restriction or the domain is not found. Try directly at <a href="https://lookup.icann.org/en/lookup?name=${encodeURIComponent(domain)}" target="_blank" style="color:#e3a93c;">ICANN Lookup</a>.</div>`;
        }
    }

    function renderWHOIS(domain, d) {
        hide('whois-loading');
        show('whois-results');
        const el = document.getElementById('whois-results');

        // Parse RDAP fields
        const registrar = d.entities?.find(e => e.roles?.includes('registrar'))?.vcardArray?.[1]?.find(v => v[0] === 'fn')?.[3] || '—';
        const registrant = d.entities?.find(e => e.roles?.includes('registrant'))?.vcardArray?.[1]?.find(v => v[0] === 'fn')?.[3] || 'Redacted for Privacy';

        const created = d.events?.find(e => e.eventAction === 'registration')?.eventDate;
        const updated = d.events?.find(e => e.eventAction === 'last changed')?.eventDate;
        const expiry  = d.events?.find(e => e.eventAction === 'expiration')?.eventDate;

        const nameservers = (d.nameservers || []).map(n => n.ldhName).join(', ') || '—';
        const status = (d.status || []).join(', ') || '—';
        const isExpired = expiry && new Date(expiry) < new Date();

        const fmt = (dt) => dt ? new Date(dt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '—';

        el.innerHTML = `
        <div class="card">
            <h3>WHOIS — ${domain} ${expiry ? `<span class="status-badge ${isExpired ? 'status-expired':'status-active'}">${isExpired ? 'Expired':'Active'}</span>` : ''}</h3>
            <table class="whois-table">
                <tr><td>Domain</td><td>${d.ldhName || domain}</td></tr>
                <tr><td>Registrar</td><td>${registrar}</td></tr>
                <tr><td>Registrant</td><td>${registrant}</td></tr>
                <tr><td>Created</td><td>${fmt(created)}</td></tr>
                <tr><td>Last Updated</td><td>${fmt(updated)}</td></tr>
                <tr><td>Expires</td><td>${fmt(expiry)}</td></tr>
                <tr><td>Nameservers</td><td>${nameservers}</td></tr>
                <tr><td>Status</td><td style="word-break:break-word;">${status}</td></tr>
            </table>
            <div class="info-note">Data via RDAP (Registration Data Access Protocol). Some registrant details may be redacted under GDPR.</div>
        </div>`;
    }

    // DNS via Cloudflare DNS-over-HTTPS
    const DNS_TYPES = ['A','AAAA','MX','NS','TXT','CNAME'];
    const TYPE_CLASSES = { A:'rt-a', AAAA:'rt-aaaa', MX:'rt-mx', NS:'rt-ns', TXT:'rt-txt', CNAME:'rt-cname' };

    async function fetchDNS(domain) {
        try {
            const results = await Promise.all(DNS_TYPES.map(t => queryDNS(domain, t)));
            renderDNS(domain, results);
        } catch (e) {
            hide('dns-loading');
            show('dns-error');
            document.getElementById('dns-error').innerHTML = `<div class="error-box">⚠️ DNS lookup failed: ${e.message}</div>`;
        }
    }

    async function queryDNS(domain, type) {
        const url = `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=${type}`;
        const r = await fetch(url, { headers: { Accept: 'application/dns-json' } });
        if (!r.ok) return { type, records: [] };
        const d = await r.json();
        return { type, records: d.Answer || [] };
    }

    function renderDNS(domain, results) {
        hide('dns-loading');
        show('dns-results');
        const el = document.getElementById('dns-results');

        const hasAny = results.some(r => r.records.length > 0);
        if (!hasAny) {
            el.innerHTML = `<div class="card"><div class="placeholder"><div class="placeholder-icon">🤷</div><p>No DNS records found for <strong>${domain}</strong></p></div></div>`;
            return;
        }

        let html = '';
        results.forEach(({ type, records }) => {
            if (!records.length) return;
            const cls = TYPE_CLASSES[type] || 'rt-a';
            html += `<div class="card"><div class="record-group"><span class="record-type ${cls}">${type}</span>`;
            records.forEach(rec => {
                html += `<div class="record-row"><span class="record-ttl">${rec.TTL}s</span><span>${escapeHtml(rec.data)}</span></div>`;
            });
            html += `</div></div>`;
        });
        el.innerHTML = html;
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
