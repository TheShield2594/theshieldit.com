<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Record Lookup | The Shield IT</title>
  <meta name="description" content="Look up DNS records for any domain — A, AAAA, MX, TXT, CNAME, NS, SOA, PTR, CAA — using Cloudflare's DNS-over-HTTPS.">
  <link rel="icon" href="/favicon.ico">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="f727bfa2-17ee-4141-82d3-a9b15d813fb6"></script>
  <script src="/shared-shell.js" defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #e3a93c; --secondary: #c98e2e; --accent: #4f86e8;
      --bg-dark: #0e1016; --bg-darker: #0b0d11; --text-light: #e9e6dd;
      --text-gray: #8e9088; --border: #181b22; --green: #22c55e; --red: #ef4444;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-darker); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }
    .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.4;
      background: radial-gradient(circle at 20% 50%, rgba(227,169,60,0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201,142,46,0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(79,134,232,0.1) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite; }
    @keyframes bgFloat { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.9); } }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
    h1 { font-size: clamp(1.75rem,4vw,2.5rem); font-weight: 800; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; }
    .subtitle { text-align: center; color: var(--text-gray); margin-bottom: 2rem; }
    .tool-panel { background: rgba(24,27,34,0.5); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.5rem; backdrop-filter: blur(10px); margin-bottom: 1.5rem; }
    .panel-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-gray); margin-bottom: 1rem; }
    input, select, textarea { width: 100%; padding: 0.75rem; background: rgba(14,16,22,0.6); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-light); font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s ease; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    input::placeholder, textarea::placeholder { color: var(--text-gray); }
    .btn { padding: 0.75rem 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: all 0.3s ease; font-family: inherit; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(227,169,60,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-full { width: 100%; margin-top: 1rem; padding: 0.875rem; }
    .result-box { background: rgba(14,16,22,0.6); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; margin-top: 0.75rem; font-family: monospace; word-break: break-all; font-size: 0.85rem; }
    .label { font-size: 0.8rem; color: var(--text-gray); margin-bottom: 0.25rem; }
    .copy-btn { font-size: 0.75rem; padding: 0.25rem 0.6rem; background: rgba(227,169,60,0.15); border: 1px solid rgba(227,169,60,0.3); color: var(--primary); border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .copy-btn:hover { background: rgba(227,169,60,0.25); }
    .badge-green { display: inline-block; background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); border-radius: 6px; padding: 0.2rem 0.6rem; font-size: 0.75rem; font-weight: 600; }
    .badge-red { display: inline-block; background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; padding: 0.2rem 0.6rem; font-size: 0.75rem; font-weight: 600; }
    .badge-yellow { display: inline-block; background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); border-radius: 6px; padding: 0.2rem 0.6rem; font-size: 0.75rem; font-weight: 600; }
    .info-note { background: rgba(227,169,60,0.08); border-left: 3px solid var(--primary); padding: 0.75rem 1rem; border-radius: 0 8px 8px 0; font-size: 0.85rem; color: var(--text-gray); margin-top: 1rem; }
    .flex-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    /* DNS-specific styles */
    .input-row { display: flex; gap: 0.75rem; align-items: stretch; }
    .input-row input { flex: 1; }
    .input-row select { width: 140px; flex-shrink: 0; }
    @media (max-width: 500px) { .input-row { flex-direction: column; } .input-row select { width: 100%; } }

    .record-section { margin-bottom: 1rem; }
    .record-header { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.75rem 1rem;
      background: rgba(14,16,22,0.5); border: 1px solid var(--border); border-radius: 10px;
      transition: border-color 0.2s ease; user-select: none; }
    .record-header:hover { border-color: rgba(227,169,60,0.4); }
    .record-header.has-records { border-color: rgba(227,169,60,0.3); }
    .record-header.no-records { opacity: 0.55; }
    .record-type-badge { font-size: 0.8rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 6px;
      background: rgba(227,169,60,0.15); border: 1px solid rgba(227,169,60,0.3); color: var(--primary);
      font-family: monospace; letter-spacing: 0.05em; min-width: 56px; text-align: center; }
    .record-count { font-size: 0.8rem; color: var(--text-gray); }
    .record-count.found { color: var(--green); }
    .chevron { margin-left: auto; color: var(--text-gray); transition: transform 0.2s ease; font-size: 0.75rem; }
    .chevron.open { transform: rotate(180deg); }

    .record-body { display: none; padding: 0.75rem 0 0; }
    .record-body.open { display: block; }

    .record-row { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem; align-items: start;
      padding: 0.6rem 0.75rem; background: rgba(14,16,22,0.4); border-radius: 8px; margin-bottom: 0.4rem;
      border: 1px solid transparent; transition: border-color 0.15s; }
    .record-row:hover { border-color: var(--border); }
    .record-row:last-child { margin-bottom: 0; }
    .record-value { font-family: monospace; font-size: 0.85rem; word-break: break-all; color: var(--text-light); }
    .record-meta { font-size: 0.75rem; color: var(--text-gray); margin-top: 0.2rem; }
    .record-priority { display: inline-block; background: rgba(201,142,46,0.15); color: var(--secondary);
      border: 1px solid rgba(201,142,46,0.3); border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.72rem;
      font-weight: 600; margin-right: 0.4rem; font-family: monospace; }

    .loading-pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--primary); margin-right: 0.5rem;
      animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.75); } }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(227,169,60,0.3);
      border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: var(--red); font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; }
    .status-nxdomain { color: #f97316; }
    .status-empty { color: var(--text-gray); font-style: italic; font-size: 0.85rem; }

    #results-area { display: none; }
    #results-area.visible { display: block; }

    .progress-bar-wrap { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin: 0.75rem 0; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px; transition: width 0.3s ease; }
  </style>
  <link rel="stylesheet" href="/field-kit-theme.css">
</head>
<body>
  <div class="bg-animation"></div>
  <div class="container">
    <h1>DNS Record Lookup</h1>
    <p class="subtitle">Query DNS records for any domain using Cloudflare DNS-over-HTTPS</p>

    <!-- Input panel -->
    <div class="tool-panel">
      <div class="panel-title">Domain Query</div>
      <div class="input-row">
        <input
          type="text"
          id="domain-input"
          placeholder="e.g. example.com or https://example.com"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Domain or URL"
        />
        <select id="record-type">
          <option value="ALL">ALL</option>
          <option value="A">A</option>
          <option value="AAAA">AAAA</option>
          <option value="MX">MX</option>
          <option value="TXT">TXT</option>
          <option value="CNAME">CNAME</option>
          <option value="NS">NS</option>
          <option value="SOA">SOA</option>
          <option value="PTR">PTR</option>
          <option value="CAA">CAA</option>
        </select>
      </div>
      <button class="btn btn-full" id="lookup-btn" onclick="runLookup()">
        Lookup DNS Records
      </button>
      <div class="info-note">
        &#128274; Queries use Cloudflare's public DNS resolver (1.1.1.1). Your IP address may be visible to Cloudflare.
      </div>
    </div>

    <!-- Results -->
    <div id="results-area">
      <div class="tool-panel">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:0.5rem;">
          <div class="panel-title" style="margin-bottom:0;">Results for <span id="results-domain" style="color:var(--text-light);"></span></div>
          <button class="copy-btn" onclick="copyAllResults()">Copy All</button>
        </div>
        <div class="progress-bar-wrap" id="progress-wrap" style="display:none;">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
        <div id="records-container"></div>
      </div>
    </div>
  </div>

  <script>
    const TYPE_MAP = { A:1, NS:2, CNAME:5, SOA:6, MX:15, TXT:16, AAAA:28, PTR:12, CAA:257 };
    const ALL_TYPES = ['A','AAAA','MX','TXT','CNAME','NS','SOA','PTR','CAA'];
    const DOH_BASE = 'https://cloudflare-dns.com/dns-query';
    const STATUS_LABELS = { 0:'NOERROR', 1:'FORMERR', 2:'SERVFAIL', 3:'NXDOMAIN', 5:'REFUSED' };

    let currentResults = {};

    const domainInput = document.getElementById('domain-input');
    domainInput.addEventListener('keydown', e => { if (e.key === 'Enter') runLookup(); });

    function sanitizeDomain(raw) {
      let d = raw.trim();
      d = d.replace(/^https?:\/\//i, '');
      d = d.replace(/\/.*$/, '');
      d = d.replace(/\s+/g, '');
      return d.toLowerCase();
    }

    async function queryDNS(domain, type) {
      const url = `${DOH_BASE}?name=${encodeURIComponent(domain)}&type=${encodeURIComponent(type)}`;
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      try {
        const resp = await fetch(url, { headers: { Accept: 'application/dns-json' }, signal: controller.signal });
        clearTimeout(timer);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp.json();
      } catch (err) {
        clearTimeout(timer);
        if (err.name === 'AbortError') throw new Error('Request timed out');
        throw err;
      }
    }

    function formatRecord(rec, type) {
      if (type === 'MX') {
        const parts = rec.data.split(' ');
        const priority = parts[0];
        const exchange = parts.slice(1).join(' ');
        return { value: exchange, extra: `Priority: ${priority}`, priority: parseInt(priority,10) };
      }
      if (type === 'TXT') {
        let val = rec.data;
        val = val.replace(/^"|"$/g, '').replace(/""/g, '');
        return { value: val };
      }
      if (type === 'SOA') {
        const parts = rec.data.split(' ');
        return { value: rec.data, extra: parts.length >= 2 ? `Primary NS: ${parts[0]}  Admin: ${parts[1]}` : '' };
      }
      return { value: rec.data };
    }

    function buildRecordSection(type, state) {
      // state: { status: 'loading'|'done'|'error', data, error, statusCode }
      const section = document.createElement('div');
      section.className = 'record-section';
      section.id = `section-${type}`;

      const hasRecords = state.status === 'done' && state.data && state.data.length > 0;
      const isNXDomain = state.status === 'done' && state.statusCode === 3;

      const header = document.createElement('div');
      header.className = 'record-header' + (hasRecords ? ' has-records' : '') + (!hasRecords && state.status === 'done' ? ' no-records' : '');
      header.onclick = () => toggleSection(type);

      let countHtml = '';
      if (state.status === 'loading') {
        countHtml = `<span class="spinner"></span><span class="record-count">Querying…</span>`;
      } else if (state.status === 'error') {
        countHtml = `<span class="record-count" style="color:var(--red);">Error</span>`;
      } else if (isNXDomain) {
        countHtml = `<span class="record-count status-nxdomain">NXDOMAIN</span>`;
      } else if (hasRecords) {
        countHtml = `<span class="record-count found">${state.data.length} record${state.data.length !== 1 ? 's' : ''}</span>`;
      } else {
        countHtml = `<span class="record-count">No records</span>`;
      }

      header.innerHTML = `
        <span class="record-type-badge">${type}</span>
        ${countHtml}
        <span class="chevron${hasRecords ? ' open' : ''}" id="chevron-${type}">&#9660;</span>
      `;

      const body = document.createElement('div');
      body.className = 'record-body' + (hasRecords ? ' open' : '');
      body.id = `body-${type}`;

      if (state.status === 'error') {
        body.innerHTML = `<div class="error-msg">&#9888; ${state.error}</div>`;
        body.className = 'record-body open';
      } else if (hasRecords) {
        const sorted = type === 'MX'
          ? [...state.data].sort((a,b) => formatRecord(a,type).priority - formatRecord(b,type).priority)
          : state.data;

        sorted.forEach(rec => {
          const { value, extra, priority } = formatRecord(rec, type);
          const row = document.createElement('div');
          row.className = 'record-row';

          const left = document.createElement('div');
          if (type === 'MX') {
            const pri = document.createElement('span');
            pri.className = 'record-priority';
            pri.textContent = priority ?? '';
            left.appendChild(pri);
          }
          const valSpan = document.createElement('span');
          valSpan.className = 'record-value';
          valSpan.textContent = value;
          left.appendChild(valSpan);
          if (extra && type !== 'MX') {
            const meta = document.createElement('div');
            meta.className = 'record-meta';
            meta.textContent = extra;
            left.appendChild(meta);
          }
          const ttl = document.createElement('div');
          ttl.className = 'record-meta';
          ttl.textContent = `TTL: ${rec.TTL}s`;
          left.appendChild(ttl);

          const copyBtn = document.createElement('button');
          copyBtn.type = 'button';
          copyBtn.className = 'copy-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.addEventListener('click', () => copyText(value, copyBtn));

          row.appendChild(left);
          row.appendChild(copyBtn);
          body.appendChild(row);
        });
      } else if (!isNXDomain && state.status === 'done') {
        body.innerHTML = `<div class="status-empty">No ${type} records found for this domain.</div>`;
      }

      section.appendChild(header);
      section.appendChild(body);
      return section;
    }

    function toggleSection(type) {
      const body = document.getElementById(`body-${type}`);
      const chevron = document.getElementById(`chevron-${type}`);
      if (!body) return;
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      if (chevron) chevron.classList.toggle('open', !isOpen);
    }

    function updateSection(type, state) {
      const existing = document.getElementById(`section-${type}`);
      const container = document.getElementById('records-container');
      const newSection = buildRecordSection(type, state);
      if (existing) {
        container.replaceChild(newSection, existing);
      } else {
        container.appendChild(newSection);
      }
    }

    async function runLookup() {
      const raw = domainInput.value.trim();
      if (!raw) { domainInput.focus(); return; }

      const domain = sanitizeDomain(raw);
      if (!domain) { alert('Please enter a valid domain name.'); return; }

      const selectedType = document.getElementById('record-type').value;
      const types = selectedType === 'ALL' ? ALL_TYPES : [selectedType];

      // Reset
      currentResults = {};
      const container = document.getElementById('records-container');
      container.innerHTML = '';
      document.getElementById('results-domain').textContent = domain;
      document.getElementById('results-area').className = 'visible';

      const progressWrap = document.getElementById('progress-wrap');
      const progressBar = document.getElementById('progress-bar');
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      const btn = document.getElementById('lookup-btn');
      btn.disabled = true;
      btn.textContent = 'Looking up…';

      // Show loading states
      types.forEach(type => {
        updateSection(type, { status: 'loading' });
      });

      let completed = 0;
      const total = types.length;

      const queries = types.map(type =>
        queryDNS(domain, type)
          .then(json => {
            const records = (json.Answer || []).filter(r => {
              const expectedNum = TYPE_MAP[type];
              return r.type === expectedNum;
            });
            // If no Answer but status 0, might have Authority
            currentResults[type] = { type, records, statusCode: json.Status };
            updateSection(type, { status: 'done', data: records, statusCode: json.Status });
          })
          .catch(err => {
            currentResults[type] = { type, error: err.message };
            updateSection(type, { status: 'error', error: err.message });
          })
          .finally(() => {
            completed++;
            progressBar.style.width = `${Math.round((completed / total) * 100)}%`;
          })
      );

      await Promise.all(queries);

      progressWrap.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Lookup DNS Records';
    }

    function copyAllResults() {
      const domain = document.getElementById('results-domain').textContent;
      const lines = [`DNS Records for: ${domain}`, ''];
      const container = document.getElementById('records-container');
      container.querySelectorAll('.record-section').forEach(section => {
        const badge = section.querySelector('.record-type-badge');
        const count = section.querySelector('.record-count');
        if (!badge) return;
        const type = badge.textContent.trim();
        lines.push(`=== ${type} (${count ? count.textContent.trim() : ''}) ===`);
        section.querySelectorAll('.record-value').forEach(el => {
          lines.push('  ' + el.textContent.trim());
        });
        lines.push('');
      });
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const btn = document.querySelector('[onclick="copyAllResults()"]');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function escAttr(str) {
      return String(str).replace(/'/g, "\\'").replace(/\\/g, '\\\\');
    }
  </script>
</body>
</html>
